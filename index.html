<!DOCTYPE html>
<html lang="en" ng-app="travelBlogApp" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wanderlust — A travel blog exploring the world one destination at a time.">
    <title>Wanderlust - Travel Blog</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AngularJS & Plugins -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar" ng-controller="NavController">
        <div class="nav-container">
            <a href="#!/" class="nav-logo">
                <i class="fa-solid fa-plane-departure"></i> Wanderlust
            </a>

            <div class="nav-right">
                <ul class="nav-links" ng-class="{'active': isMenuOpen}">
                    <li><a href="#!/" ng-class="{'active': isActive('/')}" ng-click="closeMenu()">Home</a></li>
                    <li><a href="#!/blog" ng-class="{'active': isActive('/blog')}" ng-click="closeMenu()">Blog</a></li>
                    <li><a href="#!/about" ng-class="{'active': isActive('/about')}" ng-click="closeMenu()">About</a></li>
                </ul>

                <button class="theme-toggle" ng-click="toggleTheme()" title="Toggle theme">
                    <i class="fa-solid" ng-class="isDark ? 'fa-sun' : 'fa-moon'"></i>
                </button>

                <div class="nav-toggle" ng-click="toggleMenu()">
                    <i class="fa-solid" ng-class="isMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content injected by ngRoute -->
    <main class="view-animate-container">
        <div ng-view class="view-animate"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h3><i class="fa-solid fa-plane-departure"></i> Wanderlust</h3>
                <p>Exploring the world one pixel at a time.</p>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Wanderlust Travel Blog. Built with AngularJS.</p>
        </div>
    </footer>

    <!-- Application Scripts -->
    <script src="js/app.js"></script>
    <script src="js/services/ThemeService.js"></script>
    <script src="js/services/PostService.js"></script>
    <script src="js/controllers/HomeController.js"></script>
    <script src="js/controllers/BlogController.js"></script>
    <script src="js/controllers/PostController.js"></script>
    <script src="js/controllers/AboutController.js"></script>
</body>
</html>
